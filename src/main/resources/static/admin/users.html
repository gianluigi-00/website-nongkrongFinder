<!doctype html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin User - NongkrongFinder</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav id="nav" class="nav"></nav>
<main class="container">
  <div class="between mb"><div><h1>Kelola User</h1><p class="muted">Admin dapat menambah, mengedit, dan menghapus akun.</p></div><a class="btn ghost" href="/admin/dashboard">Panel Admin</a></div>
  <div id="flash" class="hidden"></div>
  <section class="card mb">
    <form id="form" class="form-grid">
      <input type="hidden" name="idUser">
      <div><label>Nama</label><input name="nama" required></div>
      <div><label>Email</label><input name="email" type="email" required></div>
      <div><label>Password</label><input name="password" type="password" placeholder="Wajib saat tambah, opsional saat edit"></div>
      <div><label>Role</label><select name="role"><option value="USER">USER</option><option value="ADMIN">ADMIN</option></select></div>
      <div class="full"><label>Foto Profil URL</label><input name="fotoProfil"></div>
      <div class="full actions"><button class="btn primary" type="submit">Simpan User</button><button class="btn ghost" type="button" onclick="resetForm()">Reset</button></div>
    </form>
  </section>
  <section class="table-wrap"><table><thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody id="tbody"></tbody></table></section>
</main>
<script src="/js/api.js"></script>
<script>
let users = [];
function resetForm(){ document.querySelector('#form').reset(); document.querySelector('[name="idUser"]').value=''; }
async function load(){ users = await NF.request('/api/admin/users'); document.querySelector('#tbody').innerHTML = users.map(u => `<tr><td>${NF.escape(u.nama)}</td><td>${NF.escape(u.email)}</td><td><span class="badge ${u.role==='ADMIN'?'admin':'user'}">${u.role}</span></td><td>${NF.dateTime(u.createdAt)}</td><td class="actions"><button class="btn ghost" onclick="edit(${u.idUser})">Edit</button><button class="btn danger" onclick="hapus(${u.idUser})">Hapus</button></td></tr>`).join(''); }
function edit(id){ const u = users.find(x => x.idUser === id); if(!u) return; document.querySelector('[name="idUser"]').value=u.idUser; document.querySelector('[name="nama"]').value=u.nama||''; document.querySelector('[name="email"]').value=u.email||''; document.querySelector('[name="password"]').value=''; document.querySelector('[name="role"]').value=u.role||'USER'; document.querySelector('[name="fotoProfil"]').value=u.fotoProfil||''; scrollTo(0,0); }
async function hapus(id){ if(!confirm('Hapus user dan semua data terkait?')) return; try{ await NF.request('/api/admin/users/'+id,{method:'DELETE'}); NF.flash('User dihapus.'); await load(); }catch(err){ NF.flash(err.message,false); } }
document.querySelector('#form').addEventListener('submit', async e => { e.preventDefault(); const body = NF.formToObject(e.target); const id = body.idUser; delete body.idUser; try{ await NF.request(id?'/api/admin/users/'+id:'/api/admin/users',{method:id?'PUT':'POST', body}); resetForm(); NF.flash('User tersimpan.'); await load(); }catch(err){ NF.flash(err.message,false); } });
(async()=>{ await NF.guard('ADMIN'); await NF.renderNav('admin'); await load(); })();
</script>
</body></html>
