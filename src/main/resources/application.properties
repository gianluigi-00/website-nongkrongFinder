# Database MySQL khusus project ini.
# Pakai database baru agar tidak bentrok dengan tabel lama dari versi sebelumnya.
spring.datasource.url=jdbc:mysql://localhost:3306/nongkrong_finder?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Untuk development/tubes: update akan membuat kolom baru jika belum ada.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=8080
server.error.include-message=always
server.error.whitelabel.enabled=false
