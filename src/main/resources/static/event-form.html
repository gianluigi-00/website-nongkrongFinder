<!doctype html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Form Event - NongkrongFinder</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav id="nav" class="nav"></nav>
<main class="container">
  <section class="card">
    <div class="between"><div><h1 id="title">Buat Event</h1><p class="muted">Tanggal memakai format input datetime-local.</p></div><a class="btn ghost" href="/event">Kembali</a></div>
    <div id="flash" class="hidden"></div>
    <form id="form" class="form-grid mt">
      <div><label>Nama Event *</label><input name="namaEvent" required></div>
      <div><label>Tanggal Event</label><input name="tanggalEvent" type="datetime-local"></div>
      <div><label>Lokasi</label><input name="lokasi"></div>
      <div><label>Maksimal Peserta</label><input name="maksPeserta" type="number" min="0"></div>
      <div><label>Status</label><select name="status"><option value="AKTIF">AKTIF</option><option value="SELESAI">SELESAI</option><option value="BATAL">BATAL</option></select></div>
      <div class="full"><label>Deskripsi</label><textarea name="deskripsi"></textarea></div>
      <div class="full"><button class="btn primary" type="submit">Simpan Event</button></div>
    </form>
  </section>
</main>
<script src="/js/api.js"></script>
<script>
let id = NF.qs('id');
function toLocalInput(value) { if (!value) return ''; const d = new Date(value); const pad = n => String(n).padStart(2,'0'); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; }
(async () => {
  await NF.guard();
  await NF.renderNav('event');
  if (id) {
    document.querySelector('#title').textContent = 'Edit Event';
    const e = await NF.request('/api/event/' + id);
    for (const [k,v] of Object.entries(e)) { const input = document.querySelector(`[name="${k}"]`); if (input) input.value = k === 'tanggalEvent' ? toLocalInput(v) : (v ?? ''); }
  }
})();
document.querySelector('#form').addEventListener('submit', async e => {
  e.preventDefault();
  const body = NF.formToObject(e.target);
  body.maksPeserta = body.maksPeserta ? Number(body.maksPeserta) : null;
  body.tanggalEvent = body.tanggalEvent || null;
  try { await NF.request(id ? '/api/event/' + id : '/api/event', { method: id ? 'PUT' : 'POST', body }); location.href = '/event'; }
  catch (err) { NF.flash(err.message, false); }
});
</script>
</body></html>
