<!doctype html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Tempat - NongkrongFinder</title><link rel="stylesheet" href="/css/style.css"></head>
<body>
<nav id="nav" class="nav"></nav>
<main class="container">
  <div class="between mb"><div><h1>Kelola Data Tempat</h1><p class="muted">Admin bisa edit/hapus semua tempat.</p></div><a class="btn ghost" href="/admin/dashboard">Panel Admin</a></div>
  <div id="flash" class="hidden"></div>
  <section class="table-wrap"><table><thead><tr><th>Nama</th><th>Kategori</th><th>Alamat</th><th>Pembuat</th><th>Rating</th><th>Aksi</th></tr></thead><tbody id="tbody"></tbody></table></section>
</main>
<script src="/js/api.js"></script>
<script>
async function load(){ const data = await NF.request('/api/admin/tempat'); document.querySelector('#tbody').innerHTML = data.length ? data.map(t => `<tr><td>${NF.escape(t.namaTempat)}</td><td>${NF.escape(t.kategori||'-')}</td><td>${NF.escape(t.alamat||'-')}</td><td>${NF.escape(t.namaUser||'-')}</td><td>★ ${t.ratingRataRata}</td><td class="actions"><a class="btn ghost" href="/tempat-detail?id=${t.idTempat}">Detail</a><a class="btn ghost" href="/tempat-form?id=${t.idTempat}">Edit</a><button class="btn danger" onclick="hapus(${t.idTempat})">Hapus</button></td></tr>`).join('') : '<tr><td colspan="6">Belum ada data.</td></tr>'; }
async function hapus(id){ if(!confirm('Hapus tempat ini?')) return; try{ await NF.request('/api/tempat/'+id,{method:'DELETE'}); NF.flash('Tempat dihapus.'); await load(); }catch(err){ NF.flash(err.message,false); } }
(async()=>{ await NF.guard('ADMIN'); await NF.renderNav('admin'); await load(); })();
</script>
</body></html>
